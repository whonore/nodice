repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-toml
- repo: local
  hooks:
  - id: cargo-fmt
    name: cargo fmt
    language: system
    entry: cargo fmt
    pass_filenames: false
  - id: cargo-clippy
    name: cargo clippy
    language: system
    entry: cargo clippy --all-features --all-targets -- -D warnings
    pass_filenames: false
